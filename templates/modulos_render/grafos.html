<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Grafos | MathGames</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/grafos.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='/uploads/icon.png') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

{% include 'global_html/navbar.html' %}

<body class="bg-dark-purple">

<div class="container my-5">
    <div class="card shadow sudoku-card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="mb-0"><i class="bi bi-diagram-3"></i> Editor de Grafos Interactivo</h4>
            <div id="status" class="status-badge">Listo para comenzar</div>
        </div>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="panel-controls h-100">
                    
                    <div class="control-section">
                        <div class="section-title">Construcción</div>
                        <div class="d-grid gap-2">
                            <button id="addNodeBtn" class="btn btn-primary btn-sm"><i class="bi bi-plus-circle"></i> Agregar Punto</button>
                            <button id="edgeModeBtn" class="btn btn-outline-secondary btn-sm"><i class="bi bi-bezier2"></i> Conectar Puntos</button>
                        </div>
                    </div>

                    <div class="control-section">
                        <div class="section-title">Acciones</div>
                        <div class="d-grid gap-2">
                            <button id="dragModeBtn" class="btn btn-outline-secondary btn-sm active"><i class="bi bi-arrows-move"></i> Mover Puntos</button>
                            <button id="colorModeBtn" class="btn btn-outline-secondary btn-sm"><i class="bi bi-palette"></i> Pintar Puntos</button>
                            <button id="deleteModeBtn" class="btn btn-outline-danger btn-sm"><i class="bi bi-trash"></i> Eliminar</button>
                        </div>
                    </div>

                    <div class="control-section">
                        <div class="section-title">Algoritmos & Color</div>
                        <div class="row g-1 mb-2">
                            <div class="col-6">
                                <button id="autoColorBtn" class="btn btn-success btn-sm w-100"><i class="bi bi-paint-bucket"></i> Auto</button>
                            </div>
                            <div class="col-6">
                                <button id="checkColorBtn" class="btn btn-outline-success btn-sm w-100"><i class="bi bi-check-circle"></i> Verificar</button>
                            </div>
                        </div>
                        <div id="palette" class="palette-container d-flex gap-2 flex-wrap justify-content-center p-2 rounded bg-light"></div>
                    </div>

                    <div class="control-section">
                        <div class="section-title">Caminos (BFS)</div>
                        <div class="d-grid gap-2">
                            <button id="pathModeBtn" class="btn btn-outline-warning btn-sm"><i class="bi bi-arrow-left-right"></i> Buscar Camino</button>
                        </div>
                    </div>

                    <div class="control-section">
                        <div class="section-title">Gestión de Datos</div>
                        <div class="row g-1 mb-1">
                            <div class="col-6">
                                <button id="exportBtn" class="btn btn-outline-primary btn-sm w-100"><i class="bi bi-download"></i> Guardar</button>
                            </div>
                            <div class="col-6">
                                <label class="btn btn-outline-secondary btn-sm w-100 mb-0">
                                    <i class="bi bi-upload"></i> Abrir
                                    <input id="importFile" type="file" accept="application/json" hidden>
                                </label>
                            </div>
                        </div>
                        <button id="clearBtn" class="btn btn-outline-danger btn-sm w-100"><i class="bi bi-arrow-clockwise"></i> Reiniciar Lienzo</button>
                    </div>

                    <div class="metrics-card mt-3">
                        <div class="d-flex justify-content-around">
                            <div class="text-center">
                                <div class="h5 fw-bold text-primary mb-0" id="nodeCount">0</div>
                                <div class="x-small text-muted text-uppercase">Nodos</div>
                            </div>
                            <div class="text-center">
                                <div class="h5 fw-bold text-success mb-0" id="edgeCount">0</div>
                                <div class="x-small text-muted text-uppercase">Aristas</div>
                            </div>
                            <div class="text-center">
                                <div class="h5 fw-bold text-info mb-0" id="components">0</div>
                                <div class="x-small text-muted text-uppercase">Grupos</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-8 position-relative">
                <div class="board-svg-wrap">
                    <svg id="svg" preserveAspectRatio="xMidYMid meet" viewBox="0 0 800 600"></svg>
                    <div class="svg-help-overlay">
                        <span class="badge rounded-pill bg-dark opacity-75">Click en el lienzo para crear nodos</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3"></div>
    </div>
</div>

{% include 'global_html/footer.html' %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/grafos.js') }}"></script>

</body>
</html>
